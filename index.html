<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#4338ca">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="상가관리비">
<title>상가관리비 관리</title>
<style>
:root{
  --bg:#f6f7fb; --card:#ffffff; --ink:#1f2937; --sub:#4b5563; --line:#eceef4;
  --brand:#6366f1; --brand-soft:#eef2ff; --ok:#10b981; --ok-soft:#ecfdf5;
  --warn:#f59e0b; --warn-soft:#fffbeb; --bad:#ef4444; --bad-soft:#fef2f2;
  --radius:18px; --grad:linear-gradient(135deg,#6366f1,#8b5cf6);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;background:var(--bg);color:var(--ink);font-size:15px}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:15px;padding:10px 12px;border:1.5px solid var(--line);border-radius:12px;width:100%;background:#fff;color:var(--ink)}
input:focus,select:focus{outline:2px solid var(--brand);outline-offset:-1px}
label{font-size:14px;color:var(--sub);display:block;margin-bottom:4px;font-weight:700}
.main{max-width:860px;margin:0 auto;padding:10px;padding-bottom:120px}
.mobiletop{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#4338ca,#6d28d9);color:#fff;padding:10px 12px;font-weight:800;position:sticky;top:0;z-index:40;gap:6px;flex-wrap:wrap}
#brand{font-size:20px}
.mobiletop small{color:#c7d2fe;font-weight:400;font-size:12px}
.mobiletop .btn{background:rgba(255,255,255,.16);border:none;color:#fff;font-size:15px;font-weight:700;padding:8px 12px;border-radius:12px}
.card{background:var(--card);border:none;border-radius:var(--radius);padding:13px;margin-bottom:9px;box-shadow:0 1px 2px rgba(17,24,39,.05),0 6px 20px rgba(17,24,39,.05)}
.card h2{font-size:17px;font-weight:800;margin-bottom:9px}
.btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;color:var(--ink);padding:9px 12px;border-radius:12px;font-size:15px;font-weight:700;min-height:44px}
.btn.primary{background:var(--grad);border:none;color:#fff;box-shadow:0 4px 12px rgba(99,102,241,.3)}
.btn.danger{color:var(--bad);border-color:#fecaca}
.btn.sm{padding:6px 10px;font-size:13px;min-height:36px}
.btn.ghost{border:none;background:none;color:var(--brand)}
.badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:13px;font-weight:700;white-space:nowrap}
.b-ok{background:var(--ok-soft);color:var(--ok)} .b-warn{background:var(--warn-soft);color:var(--warn)}
.b-bad{background:var(--bad-soft);color:var(--bad)} .b-gray{background:#f1f5f9;color:var(--sub)} .b-brand{background:var(--brand-soft);color:var(--brand)}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;color:var(--sub);font-size:13px;font-weight:800;padding:8px 8px;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:9px 8px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tr.click{cursor:pointer} tr.click:hover td{background:#f8fafc}
.tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.spacer{flex:1} .mt{margin-top:10px}
.muted{color:var(--sub);font-size:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.item{background:#f6f7fd;border-radius:14px;padding:9px 11px}
.item .k{font-size:14px;color:var(--sub);font-weight:700}
.item .v{font-size:19px;font-weight:800;margin-top:2px}
.empty{text-align:center;color:var(--sub);padding:16px;font-size:15px}
.tabbar{display:flex;position:fixed;bottom:10px;left:10px;right:10px;max-width:840px;margin:0 auto;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-radius:26px;box-shadow:0 8px 30px rgba(49,46,129,.22);z-index:40;padding:7px 5px calc(7px + env(safe-area-inset-bottom))}
.tabbar button{flex:1;background:none;border:none;padding:7px 1px 8px;font-size:14px;font-weight:800;color:var(--sub);display:flex;flex-direction:column;align-items:center;gap:3px;border-radius:18px;margin:0 2px;white-space:nowrap}
.tabbar button .ico{font-size:24px}
.tabbar button.active{color:var(--brand);background:var(--brand-soft)}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:#312e81;color:#fff;padding:10px 20px;border-radius:99px;font-size:14px;z-index:99;opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1}
.seg{display:flex;gap:6px;margin-bottom:10px}
.seg button{flex:1;justify-content:center}
.seg button.on{background:var(--grad);color:#fff;border:none;box-shadow:0 4px 12px rgba(99,102,241,.3)}
.copybox{background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:12px;font-size:14px;white-space:pre-wrap;line-height:1.6}
@media print{
  body *{visibility:hidden}
  #printArea,#printArea *{visibility:visible}
  #printArea{position:absolute;left:0;top:0;width:100%}
  .tabbar,.mobiletop{display:none}
}
</style>
</head>
<body>
<div id="lockScreen" style="position:fixed;inset:0;background:linear-gradient(160deg,#312e81 0%,#1e1b4b 60%,#0f0d2e 100%);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:20px">
  <div style="font-size:40px">🏢</div>
  <div style="color:#fff;font-weight:800;font-size:18px" id="lockTitle">상가관리비 관리</div>
  <div style="color:#94a3b8;font-size:13px">이메일로 로그인하세요</div>
  <input type="email" id="authEmail" placeholder="이메일" style="max-width:270px;padding:12px">
  <input type="password" id="authPw" placeholder="비밀번호 (6자 이상)" style="max-width:270px;padding:12px" onkeydown="if(event.key==='Enter')fbLogin()">
  <button class="btn primary" style="width:270px;justify-content:center;padding:12px" onclick="fbLogin()">로그인</button>

  <div style="color:#4c4a7a;font-size:11.5px;text-align:center">☁️ 데이터는 본인 계정의 클라우드에 저장됩니다<br>버전 b0714c</div>
</div>

<div class="mobiletop"><div id="brand">🏢 상가관리비 <small id="brandSub"></small></div>
  <div class="row" style="gap:6px">
    <button class="btn" onclick="goBack()">◀</button>
    <button class="btn" onclick="go('settings')">⚙️</button></div></div>
<main class="main" id="main"></main>
<nav class="tabbar" id="tabbar"></nav>

<script>
/* 오류 진단: 문제가 생기면 로그인 화면에 원인을 표시 */
window.addEventListener('error',function(e){var el=document.getElementById('lockMsg');if(el&&e.message)el.textContent='⚠️ 오류: '+e.message;});
window.addEventListener('unhandledrejection',function(e){var el=document.getElementById('lockMsg');var r=e.reason;if(el)el.textContent='⚠️ 오류: '+((r&&(r.code||r.message))||r||'알 수 없음');});
setTimeout(function(){if(!window.fbLogin){var el=document.getElementById('lockMsg');if(el)el.textContent='⚠️ 로그인 모듈을 불러오지 못했습니다 — 인터넷 연결을 확인하고, 카카오톡 안이 아닌 사파리/크롬 브라우저에서 열어주세요';}},4000);
</script>
<script>
/* ═══════════ 기본 ═══════════ */
const DBKEY='bldgadmin_v1';
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const pad=n=>String(n).padStart(2,'0');
const iso=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
const todayStr=()=>iso(new Date());
const thisYM=()=>todayStr().slice(0,7);
const fmt=n=>(Math.round(n)||0).toLocaleString('ko-KR');
const fmtDate=ds=>ds?ds.replace(/-/g,'.'):'-';
const fmtMD=ds=>ds?ds.slice(5).replace('-','.'):'-';
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtPhone=s=>{const d=String(s||'').replace(/[^0-9]/g,'');if(d.length===11)return d.slice(0,3)+'-'+d.slice(3,7)+'-'+d.slice(7);if(d.length===10)return d.slice(0,3)+'-'+d.slice(3,6)+'-'+d.slice(6);return s||'';};
function fmtPhoneInput(el){const d=el.value.replace(/[^0-9]/g,'').slice(0,11);let out=d;
  if(d.length>7)out=d.slice(0,3)+'-'+d.slice(3,d.length-4)+'-'+d.slice(-4);
  else if(d.length>3)out=d.slice(0,3)+'-'+d.slice(3);el.value=out;}

/* ── 2개월 청구 주기: 기록의 연월 = 청구기간 첫 달 (예: 2026-05 → 5·6월분, 지침 5.1→7.1) ── */
const perMonths=ym=>{const m=Number(ym.slice(5,7));const m2=m===12?1:m+1;const m3=m2===12?1:m2+1;return[m,m2,m3];};
const perLabel=ym=>{const[a,b]=perMonths(ym);return a+'·'+b+'월';};
/* 공과금 입력 항목 (고지서 금액 입력칸) */
const utilFields=ym=>{const[a,b]=perMonths(ym);return[
 ['water1','1층 수도'],
 ['water2','2층 수도'],
 ['waterCommon','공용수도'],
 ['water3','3층 수도'],
 ['elec1','공용전기 '+a+'월'],
 ['elec2','공용전기 '+b+'월'],
 ['septic','정화조 청소비'],
 ['safety','전기·소방안전관리비'],
 ['mgmt','상가관리비'],
 ['clean','상가청소비'],
 ['etc','기타비용']];};
/* 업체별 분담 가중치 항목 (수도 1·2층은 계량기 사용량 기준 배분) */
const COSTS=[
 ['water12','수도(1·2층 계량)'],
 ['waterCommon','공용수도'],
 ['water3','3층 수도'],
 ['elec','공용전기'],
 ['septic','정화조 청소비'],
 ['safety','전기·소방안전'],
 ['mgmt','상가관리비'],
 ['clean','상가청소비'],
 ['etc','기타비용']];
/* 청구 항목 키 → 표시명 */
const ITEM_KEYS=['water12','waterCommon','water3','elec1','elec2','septic','safety','mgmt','clean','etc'];
const itemLabel=(k,ym)=>{const[a,b]=perMonths(ym);return{water12:'수도(1·2층)',waterCommon:'공용수도',water3:'3층 수도',elec1:'공용전기 '+a+'월',elec2:'공용전기 '+b+'월',septic:'정화조 청소비',safety:'전기·소방안전관리비',mgmt:'상가관리비',clean:'상가청소비',etc:'기타비용'}[k]||k;};
/* 공용비 배분: [금액키, 가중치키] — 전기 1·2는 같은 가중치(elec) 사용 */
const SHARE=[['waterCommon','waterCommon'],['water3','water3'],['elec1','elec'],['elec2','elec'],['septic','septic'],['safety','safety'],['mgmt','mgmt'],['clean','clean'],['etc','etc']];

function load(){
  try{const d=JSON.parse(localStorage.getItem(DBKEY));if(d&&d.shops)return d;}catch(e){}
  return {shops:[],months:{},ledger:[],settings:{}};
}
let db=load();
function migrateDb(){
  db.shops=db.shops||[];db.months=db.months||{};db.ledger=db.ledger||[];
  db.settings=Object.assign({buildingName:'우리상가',account:'',mgr:'',unitRound:10,dispRound:100,shareRound:10,lastBackup:''},db.settings||{});
  db.shops.forEach(s=>{s.part=s.part||{};COSTS.forEach(([k])=>{if(s.part[k]==null)s.part[k]=1;});});
  // 구버전 데이터 이관: water12 금액→water1, elec→elec1
  Object.values(db.months||{}).forEach(M=>{if(!M.utils)return;
    if(M.utils.water12!=null&&M.utils.water1==null){M.utils.water1=M.utils.water12;delete M.utils.water12;}
    if(M.utils.elec!=null&&M.utils.elec1==null){M.utils.elec1=M.utils.elec;delete M.utils.elec;}});
}
migrateDb();
const S=()=>db.settings;
function save(){const j=JSON.stringify(db);localStorage.setItem(DBKEY,j);if(window.queueCloudSave)window.queueCloudSave(j);}
let toastTimer;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2000);}
function copyText(text,msg){navigator.clipboard?.writeText(text).then(()=>toast(msg||'복사되었습니다')).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast(msg||'복사되었습니다');});}

/* ═══════════ 계산 엔진 ═══════════ */
const roundTo=(v,u)=>u>0?Math.round(v/u)*u:Math.round(v);
function activeShops(){return db.shops.filter(s=>s.status!=='공실');}
function prevYM(ym,n){const d=new Date(ym+'-01T00:00:00');d.setMonth(d.getMonth()-(n||1));return d.getFullYear()+'-'+pad(d.getMonth()+1);}
// 미납 이월: 확정된 이전 달들의 (청구+조정-납부) 누계
function carryFor(sid,ym){
  let c=0;
  Object.keys(db.months).filter(k=>k<ym&&db.months[k].confirmed).forEach(k=>{
    const M=db.months[k];const ch=(M.charges||{})[sid];if(!ch)return;
    const p=((M.pays||{})[sid]||{});
    c+=(ch.base||0)+(p.adj||0)-(p.paid||0);
  });
  return c;
}
function calcMonth(ym){
  const M=db.months[ym];if(!M)return null;
  const st=S();
  const shops=activeShops();
  const warns=[];const recon=[];
  const charges={};shops.forEach(s=>charges[s.id]={items:{},usage:0});
  // ── 수도 사용량 ──
  let totalU=0;
  shops.forEach(s=>{
    if((s.part.water12||0)<=0)return;
    const mt=(M.meters||{})[s.id]||{};
    if(mt.curr==null||mt.curr==='')warns.push('⚠️ '+s.name+': 금월 지침 누락');
    const base=Number(mt.base)||0, curr=Number(mt.curr)||0;
    let u=curr-base;
    if(u<0){warns.push('🚨 '+s.name+': 검침값 역전(사용량 음수) — 0으로 처리');u=0;}
    const pm=db.months[prevYM(ym,2)];
    const pu=pm&&pm.charges&&pm.charges[s.id]?pm.charges[s.id].usage:null;
    if(pu!=null&&pu>0&&u>pu*3)warns.push('⚠️ '+s.name+': 이상 사용량 (전기간 '+pu+'톤 → 금기간 '+u+'톤)');
    charges[s.id].usage=u;totalU+=u;
  });
  // ── 1·2층 수도 (1층+2층 고지서 합산 → 사용량 비례 배분) ──
  const wAmt=(Number((M.utils||{}).water1)||0)+(Number((M.utils||{}).water2)||0);
  if(wAmt>0){
    if(totalU<=0){warns.push('🚨 1·2층 수도: 사용량 합계가 0 — 지침을 입력하세요');}
    else{
      const unit=roundTo(wAmt/totalU,st.unitRound); M.waterUnit=unit;
      let sum=0;
      shops.forEach(s=>{if((s.part.water12||0)>0){const v=roundTo(charges[s.id].usage*unit,st.dispRound);charges[s.id].items.water12=v;sum+=v;}});
      let diff=wAmt-sum, dsum=0;
      if(diff>0){
        const tw=shops.reduce((a,s)=>a+((s.part.water12||0)>0?s.part.water12:0),0);
        shops.forEach(s=>{const w=s.part.water12||0;if(w>0){const v=roundTo(diff*w/tw,st.shareRound);charges[s.id].items.water12+=v;dsum+=v;}});
      }
      const absorbed=diff-dsum;
      recon.push({label:'수도 1·2층 합산 (단가 '+fmt(unit)+'/톤)',amt:wAmt,
        sum:shops.reduce((a,s)=>a+(charges[s.id].items.water12||0),0),absorbed});
    }
  }
  // ── 공용비 분담 ──
  SHARE.forEach(([k,wk])=>{
    const label=itemLabel(k,ym);
    const amt=Number((M.utils||{})[k])||0;if(amt<=0)return;
    const tw=shops.reduce((a,s)=>a+(s.part[wk]||0),0);
    if(tw<=0){recon.push({label,amt,sum:0,absorbed:amt});warns.push('⚠️ '+label+': 참여 업체 없음(전액 미분담)');return;}
    let sum=0;
    shops.forEach(s=>{const w=s.part[wk]||0;if(w>0){const v=roundTo(amt*w/tw,st.shareRound);charges[s.id].items[k]=v;sum+=v;}});
    recon.push({label,amt,sum,absorbed:amt-sum});
  });
  // ── 합계 ──
  shops.forEach(s=>{
    const c=charges[s.id];
    c.base=Object.values(c.items).reduce((a,v)=>a+v,0);
    c.carry=carryFor(s.id,ym);
    const p=((M.pays||{})[s.id]||{});
    c.adj=p.adj||0;
    c.total=c.base+c.carry+c.adj;
  });
  M.charges=charges;M.recon=recon;M.warns=warns;M.calcAt=todayStr();
  return M;
}
function payStatus(M,sid){
  const p=((M.pays||{})[sid]||{});
  if(p.override)return p.override;
  const ch=(M.charges||{})[sid];
  if(!ch||!M.confirmed)return '청구전';
  if(ch.total<=0)return '면제';
  const paid=p.paid||0;
  if(paid<=0)return (M.info&&M.info.due&&todayStr()>M.info.due)?'미납':'청구완료';
  if(paid<ch.total)return '일부납부';
  return '납부완료';
}
const stBadge=s=>({'청구전':'b-gray','청구완료':'b-brand','납부완료':'b-ok','일부납부':'b-warn','미납':'b-bad','면제':'b-gray'}[s]||'b-gray');

/* ═══════════ 화면 ═══════════ */
let view='home',viewParam=null,navStack=[];
let calcYM=thisYM(),payYM=thisYM(),payTab='pay',shopEdit=null,invoiceShop=null;
function go(v,p){if(view!==v||viewParam!==(p??null)){navStack.push([view,viewParam]);if(navStack.length>30)navStack.shift();}view=v;viewParam=p??null;render();window.scrollTo(0,0);}
function goBack(){const pv=navStack.pop();if(pv){view=pv[0];viewParam=pv[1];render();window.scrollTo(0,0);}else go('home');}
const TABS=[['home','🏠','홈'],['calc','🧮','계산'],['shops','🏬','업체'],['pay','💳','수납'],['settings','⚙️','설정']];

function ymOptions(sel){
  const keys=Object.keys(db.months).sort().reverse();
  if(!keys.includes(thisYM()))keys.unshift(thisYM());
  return keys.map(k=>`<option value="${k}" ${k===sel?'selected':''}>${k.slice(0,4)}년 ${perLabel(k)}</option>`).join('');
}
function ensureMonth(ym){
  if(db.months[ym])return db.months[ym];
  const[a,,c]=perMonths(ym);
  const M={info:{billDate:todayStr(),due:'',mgr:S().mgr||'',note:'',baseDate:a+'.1',currDate:c+'.1'},utils:{},meters:{},pays:{},charges:{},recon:[],warns:[],confirmed:false,baseMode:'prev'};
  // 기준지침 자동: 전 기간(2개월 전) 금월지침 → 이번 기간 기준
  const pm=db.months[prevYM(ym,2)];
  activeShops().forEach(s=>{
    const prev=pm&&pm.meters&&pm.meters[s.id]?pm.meters[s.id].curr:'';
    M.meters[s.id]={base:prev||'',curr:''};
  });
  db.months[ym]=M;save();
  return M;
}

function confirmBill(ym){
  const M=db.months[ym];

  }else{

      <button class="btn danger" type="button" onclick="delShop('${id}')">삭제</button>`:''}

function saveShop(e,id){
  e.preventDefault();
  const f=new FormData(e.target);
  const part={};COSTS.forEach(([k])=>part[k]=Number(f.get('part_'+k))||0);
  const data={floor:f.get('floor').trim(),unit:f.get('unit').trim(),name:f.get('name').trim(),
    owner:f.get('owner').trim(),phone:f.get('phone').trim(),status:f.get('status'),meterNo:f.get('meterNo').trim(),part};
  if(id){Object.assign(db.shops.find(x=>x.id===id),data);toast('수정되었습니다');}
  else{db.shops.push({id:uid(),...data});toast('업체가 등록되었습니다');}
  save();shopEdit=null;render();
}
function delShop(id){
  const s=db.shops.find(x=>x.id===id);
  if(!confirm(s.name+'을(를) 삭제할까요?\n과거 청구 내역에서도 함께 제외됩니다.'))return;
  db.shops=db.shops.filter(x=>x.id!==id);save();shopEdit=null;render();
}

      <tr><td>미납이월</td><td style="text-align:right;font-weight:700;${ch.carry>0?'color:var(--bad)':''}">${fmt(ch.carry)}</td></tr>
      <tr><td>할인/조정</td><td style="text-align:right"><input type="number" value="${p.adj||0}" style="width:120px;text-align:right;padding:6px;display:inline-block" onchange="db.months['${ym}'].pays['${sid}'].adj=Number(this.value)||0;calcMonth('${ym}');save();render()"></td></tr>
      <tr style="background:#f8fafc"><td><b>최종 청구액</b></td><td style="text-align:right;font-weight:800;color:var(--brand);font-size:17px">${fmt(ch.total)}</td></tr>
    </table></div>
    <h2 class="mt" style="font-size:15px;margin-top:14px">납부 처리</h2>
    <div class="grid3">
      <div><label>납부금액</label><input type="number" id="payAmt" value="${p.paid||''}" placeholder="${ch.total}"></div>
      <div><label>납부일</label><input type="date" id="payDate" value="${p.date||todayStr()}"></div>
      <div><label>입금자명</label><input id="payer" value="${esc(p.payer||'')}" placeholder="${esc(s.name)}"></div>
    </div>
    <div class="row mt">
      <button class="btn primary" onclick="doPay('${ym}','${sid}')">✅ 납부 저장</button>
      <button class="btn" onclick="document.getElementById('payAmt').value=${ch.total};doPay('${ym}','${sid}')">전액 납부</button>
      <select style="width:auto" onchange="db.months['${ym}'].pays['${sid}'].override=this.value||null;save();render()">
        <option value="">상태 자동</option>
        ${['면제','미납','청구완료'].map(o=>`<option ${p.override===o?'selected':''}>${o}</option>`).join('')}</select>
    </div>
    <h2 class="mt" style="font-size:15px;margin-top:14px">청구서</h2>
    <div class="copybox" id="invText">${esc(invoiceText(ym,sid))}</div>
    <div class="row mt">
      <button class="btn" onclick="copyText(invoiceText('${ym}','${sid}'),'청구서가 복사되었습니다 — 카톡·문자에 붙여넣으세요')">💬 카톡/문자 복사</button>
      <button class="btn" onclick="printInvoice('${ym}','${sid}')">🖨 인쇄·PDF</button>
      ${s.phone?`<a class="btn" href="sms:${String(s.phone).replace(/[^0-9]/g,'')}" onclick="copyText(invoiceText('${ym}','${sid}'),'복사됨')" style="text-decoration:none">✉️ 문자</a>`:''}
    </div></div>`;
}
function doPay(ym,sid){
  const M=db.months[ym];
  const p=M.pays[sid];
  p.paid=Number(document.getElementById('payAmt').value)||0;
  p.date=document.getElementById('payDate').value||todayStr();
  p.payer=document.getElementById('payer').value.trim();
  save();render();toast('납부 처리되었습니다');
}
function invoiceText(ym,sid){
  const M=db.months[ym];const s=db.shops.find(x=>x.id===sid);
  const ch=(M.charges||{})[sid]||{items:{},base:0,carry:0,adj:0,total:0,usage:0};
  const L=[];
  L.push('['+S().buildingName+'] '+ym.slice(0,4)+'년 '+perLabel(ym)+'분 관리비 청구서');
  L.push('업체: '+s.unit+'호 '+s.name);
  if(M.info.due)L.push('납부기한: '+fmtDate(M.info.due));
  L.push('──────────');
  ITEM_KEYS.forEach(k=>{if(ch.items[k])L.push('· '+itemLabel(k,ym)+(k==='water12'?'('+(ch.usage||0)+'톤)':'')+': '+fmt(ch.items[k]));});
  if(ch.carry)L.push('· 미납이월: '+fmt(ch.carry));
  if(ch.adj)L.push('· 할인/조정: '+fmt(ch.adj));
  L.push('──────────');
  L.push('최종 청구액: '+fmt(ch.total));
  if(S().account)L.push('입금계좌: '+S().account);
  L.push('감사합니다.');
  return L.join('\n');
}
function printInvoice(ym,sid){
  const el=document.getElementById('printArea');
  el.innerHTML='<div style="padding:30px;font-size:16px;line-height:1.9;white-space:pre-wrap;font-family:inherit">'+esc(invoiceText(ym,sid))+'</div>';
  el.style.display='block';
  window.print();
  setTimeout(()=>{el.style.display='none';},500);
}
function exportPayCSV(ym){
  const M=db.months[ym];const shops=activeShops();
  const rows=[['호수','업체명','사용량(톤)',...ITEM_KEYS.map(k=>itemLabel(k,ym)),'미납이월','조정','최종청구','납부액','미납액','상태','납부일','입금자']];
  shops.forEach(s=>{const ch=M.charges[s.id]||{items:{}};const p=(M.pays||{})[s.id]||{};
    rows.push([s.unit,s.name,ch.usage||0,...ITEM_KEYS.map(k=>ch.items[k]||0),ch.carry||0,ch.adj||0,ch.total||0,p.paid||0,(ch.total||0)-(p.paid||0),payStatus(M,s.id),p.date||'',p.payer||'']);});
  const csv='﻿'+rows.map(r=>r.map(c=>'"'+String(c??'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='관리비_'+ym+'.csv';a.click();toast('CSV 다운로드');
}

/* ── 출납부 ── */
function ledgerEntries(){
  const ev=[];
  Object.keys(db.months).forEach(ym=>{
    const M=db.months[ym];
    Object.keys(M.pays||{}).forEach(sid=>{
      const p=M.pays[sid];if(!p||!p.paid)return;
      const s=db.shops.find(x=>x.id===sid);
      ev.push({d:p.date||ym+'-28',kind:'in',cat:'관리비 수납',amt:p.paid,memo:(s?s.unit+'호 '+s.name:'')+' ('+ym+')',auto:true});
    });
  });
  db.ledger.forEach(l=>ev.push({...l,d:l.date,cat:l.category,amt:l.amount}));
  return ev.sort((a,b)=>b.d.localeCompare(a.d));
}
function vLedger(){
  const ev=ledgerEntries();
  const yms=[...new Set(ev.map(e=>e.d.slice(0,7)))].sort();
  let carry=0;const monthly=yms.map(ym=>{
    const list=ev.filter(e=>e.d.startsWith(ym));
    const inc=list.filter(e=>e.kind==='in').reduce((a,e)=>a+e.amt,0);
    const out=list.filter(e=>e.kind==='out').reduce((a,e)=>a+e.amt,0);
    const row={ym,carry,inc,out,bal:carry+inc-out};carry=row.bal;return row;}).reverse();
  return `<div class="row" style="margin-bottom:8px"><h1 style="font-size:19px">🧾 금전출납부</h1><div class="spacer"></div>
    <span class="badge b-brand" style="font-size:15px">현재잔액 ${fmt(carry)}</span></div>
  <div class="card"><h2>지출 기록 <span class="muted" style="font-weight:400">수납은 자동으로 수입 처리됩니다</span></h2>
    <div class="row">
      <input type="date" id="lgDate" value="${todayStr()}" style="width:auto">
      <select id="lgCat" style="width:auto">${['수리비','청소비','정화조비','소방안전관리비','기타지출'].map(c=>`<option>${c}</option>`).join('')}</select>
      <input type="number" id="lgAmt" placeholder="금액" style="width:110px;flex:none" inputmode="numeric">
      <input id="lgMemo" placeholder="비고" style="flex:1;min-width:90px">
      <button class="btn primary sm" onclick="addExpense()">추가</button></div></div>
  <div class="card"><h2>월별 정산</h2>
    <div class="tablewrap"><table style="font-weight:700">
      <tr><th>월</th><th>이월</th><th>수입</th><th>지출</th><th>잔액</th></tr>
      ${monthly.map(r=>`<tr><td><b>${r.ym.replace('-','.')}</b></td><td>${fmt(r.carry)}</td>
        <td style="color:var(--ok)">${fmt(r.inc)}</td><td style="color:var(--bad)">${fmt(r.out)}</td><td><b>${fmt(r.bal)}</b></td></tr>`).join('')||'<tr><td colspan="5" class="empty">내역이 없습니다</td></tr>'}
    </table></div></div>
  <div class="card"><h2>상세 내역</h2>
    ${ev.length?`<div class="tablewrap"><table style="font-weight:700">
      <tr><th>날짜</th><th>구분</th><th>항목</th><th>금액</th><th>비고</th><th></th></tr>
      ${ev.slice(0,40).map(e=>`<tr><td>${fmtMD(e.d)}</td>
        <td><span class="badge ${e.kind==='in'?'b-ok':'b-bad'}">${e.kind==='in'?'수입':'지출'}</span></td>
        <td style="white-space:nowrap">${esc(e.cat)}</td><td>${fmt(e.amt)}</td>
        <td class="muted" style="white-space:nowrap">${esc(e.memo||'')}</td>
        <td>${e.auto?'':`<button class="btn sm danger" onclick="delExpense('${e.id}')">삭제</button>`}</td></tr>`).join('')}
    </table></div>`:'<div class="empty">내역이 없습니다</div>'}</div>`;
}
function addExpense(){
  const date=document.getElementById('lgDate').value;
  const amount=Number(document.getElementById('lgAmt').value)||0;
  if(!date||amount<=0)return toast('날짜와 금액을 입력하세요');
  db.ledger.push({id:uid(),date,kind:'out',category:document.getElementById('lgCat').value,amount,memo:document.getElementById('lgMemo').value.trim()});
  save();render();toast('지출이 기록되었습니다');
}
function delExpense(id){
  if(!confirm('이 지출 기록을 삭제할까요?'))return;
  db.ledger=db.ledger.filter(l=>l.id!==id);save();render();
}

/* ── 설정 ── */
function vSettings(){
  const s=S();
  return `<h1 style="font-size:19px;margin-bottom:8px">⚙️ 설정</h1>
  <div class="card"><h2>🏢 건물정보</h2>
    <div class="grid2">
      <div><label>건물(상가) 이름</label><input id="setName" value="${esc(s.buildingName)}"></div>
      <div><label>기본 담당자</label><input id="setMgr" value="${esc(s.mgr||'')}"></div>
      <div style="grid-column:1/-1"><label>입금 계좌정보</label><input id="setAcct" value="${esc(s.account)}" placeholder="○○은행 000-000-000000 (예금주)"></div>
    </div>
    <button class="btn primary mt" onclick="saveSet()">저장</button></div>
  <div class="card"><h2>🔢 반올림 설정</h2>
    <div class="grid3">
      <div><label>톤당 단가</label><select id="setU">${[1,10,100].map(u=>`<option value="${u}" ${s.unitRound===u?'selected':''}>${u}원 단위</option>`).join('')}</select></div>
      <div><label>수도요금 표시</label><select id="setD">${[1,10,100].map(u=>`<option value="${u}" ${s.dispRound===u?'selected':''}>${u}원 단위</option>`).join('')}</select></div>
      <div><label>분담금</label><select id="setS">${[1,10,100].map(u=>`<option value="${u}" ${s.shareRound===u?'selected':''}>${u}원 단위</option>`).join('')}</select></div>
    </div>
    <button class="btn primary mt" onclick="saveSet()">저장</button></div>
  <div class="card"><h2>💾 백업·복원</h2>
    <div class="row">
      <button class="btn" onclick="exportData()">⬇️ 백업</button>
      <button class="btn" onclick="document.getElementById('importFile').click()">⬆️ 복원</button></div>
    <div class="muted mt">마지막 백업: ${s.lastBackup?fmtDate(s.lastBackup):'없음'} · 데이터는 클라우드에도 자동 저장됩니다.</div></div>
  <div class="card"><h2>👤 계정</h2>
    <div class="row"><span class="muted">로그인: <b>${esc(window.fbUserEmail||'')}</b></span>
    <button class="btn sm danger" onclick="window.fbLogout&&window.fbLogout()">로그아웃</button></div>
    <div class="muted mt">앱 버전 b0714c</div></div>`;
}
function saveSet(){
  S().buildingName=document.getElementById('setName').value.trim()||'우리상가';
  S().mgr=document.getElementById('setMgr').value.trim();
  S().account=document.getElementById('setAcct').value.trim();
  const u=document.getElementById('setU'),d=document.getElementById('setD'),sh=document.getElementById('setS');
  if(u)S().unitRound=Number(u.value);if(d)S().dispRound=Number(d.value);if(sh)S().shareRound=Number(sh.value);
  save();render();toast('설정이 저장되었습니다');
}
function exportData(){
  S().lastBackup=todayStr();save();
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:'application/json'}));
  a.download='상가관리비_백업_'+todayStr()+'.json';a.click();toast('백업 파일 다운로드');render();
}
document.getElementById('importFile').addEventListener('change',function(){
  const f=this.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.shops)throw 0;
    if(!confirm('현재 데이터를 백업 파일로 교체할까요?'))return;
    db=d;migrateDb();save();render();toast('복원되었습니다');
  }catch(e){toast('올바른 백업 파일이 아닙니다');}};
  r.readAsText(f);this.value='';
});

/* ═══════════ 렌더 ═══════════ */
function render(){
  try{
  document.getElementById('brandSub').textContent=S().buildingName;
  document.getElementById('tabbar').innerHTML=TABS.map(([id,ico,lbl])=>
    `<button class="${view===id?'active':''}" onclick="go('${id}')"><span class="ico">${ico}</span>${lbl}</button>`).join('');
  const el=document.getElementById('main');
  if(view==='home')el.innerHTML=vHome();
  else if(view==='calc')el.innerHTML=vCalc();
  else if(view==='shops')el.innerHTML=vShops();
  else if(view==='pay')el.innerHTML=vPay();
  else if(view==='settings')el.innerHTML=vSettings();
  }catch(err){
    console.error(err);
    const el=document.getElementById('main');
    if(el)el.innerHTML='<div class="card" style="border-left:5px solid var(--bad)"><b>⚠️ 화면 표시 중 오류</b><div class="muted" style="margin:8px 0">'+esc(String(err&&err.message||err))+'</div><button class="btn primary" onclick="view=\'home\';render()">홈으로</button></div>';
  }
}
window.getDbJson=()=>JSON.stringify(db);
window.applyCloudDb=(d)=>{db=d;migrateDb();save();render();};
if(navigator.storage&&navigator.storage.persist)navigator.storage.persist();
render();
</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth,onAuthStateChanged,signInWithEmailAndPassword,createUserWithEmailAndPassword,sendPasswordResetEmail,signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { initializeFirestore,persistentLocalCache,doc,getDoc,setDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
const firebaseConfig={
  apiKey:"AIzaSyBaSAZBrkbtqNBSYO8w2IYZami6iMAnEeY",
  authDomain:"studiomuse-app.firebaseapp.com",
  projectId:"studiomuse-app",
  storageBucket:"studiomuse-app.firebasestorage.app",
  messagingSenderId:"1098980343908",
  appId:"1:1098980343908:web:7b5d8b26f1bb5ffb925f71"
};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const fsdb=initializeFirestore(app,{localCache:persistentLocalCache()});
const msg=t=>{const el=document.getElementById('lockMsg');if(el)el.textContent=t;};
const email=()=>document.getElementById('authEmail').value.trim();
const pw=()=>document.getElementById('authPw').value;
function errKo(e){const c=(e&&e.code)||'';
  if(c.includes('invalid-email'))return '이메일 형식이 올바르지 않습니다';
  if(c.includes('missing-password')||c.includes('weak-password'))return '비밀번호는 6자 이상 입력하세요';
  if(c.includes('email-already-in-use'))return '이미 가입된 이메일입니다. 로그인해 주세요';
  if(c.includes('invalid-credential')||c.includes('wrong-password')||c.includes('user-not-found'))return '이메일 또는 비밀번호가 올바르지 않습니다';
  if(c.includes('too-many-requests'))return '시도가 너무 많습니다. 잠시 후 다시 시도하세요';
  return '오류: '+c;}
window.fbLogin=async()=>{try{msg('로그인 중...');await signInWithEmailAndPassword(auth,email(),pw());msg('');}catch(e){msg(errKo(e));}};
window.fbSignup=async()=>{try{msg('');await createUserWithEmailAndPassword(auth,email(),pw());}catch(e){msg(errKo(e));}};
window.fbReset=async()=>{try{if(!email())return msg('이메일을 먼저 입력하세요');await sendPasswordResetEmail(auth,email());msg('재설정 메일을 보냈습니다.');}catch(e){msg(errKo(e));}};
window.fbLogout=()=>{if(!confirm('로그아웃할까요?'))return;localStorage.removeItem('bldgadmin_v1');signOut(auth).then(()=>location.reload());};
let saveTimer=null,uid2=null;
window.queueCloudSave=(json)=>{if(!uid2)return;clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{setDoc(doc(fsdb,'bldg',uid2),{payload:json,updated:Date.now()}).catch(e=>console.warn(e));},800);};
onAuthStateChanged(auth,async user=>{
  const lock=document.getElementById('lockScreen');
  if(!user){uid2=null;window.fbUserEmail='';lock.style.display='flex';return;}
  uid2=user.uid;window.fbUserEmail=user.email||'';
  try{
    const snap=await getDoc(doc(fsdb,'bldg',uid2));
    if(snap.exists()&&snap.data().payload)window.applyCloudDb(JSON.parse(snap.data().payload));
    else await setDoc(doc(fsdb,'bldg',uid2),{payload:window.getDbJson(),updated:Date.now()});
  }catch(e){console.warn('클라우드 불러오기 실패',e);}
  lock.style.display='none';
});
if('serviceWorker' in navigator && location.protocol==='https:'){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
